services:
  app:
    build: .
    env_file:
      - .env
    # Bind only to localhost on the droplet. Nginx on the host will proxy to this.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # Session-only state (latest engine payloads + chat image metadata)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:


