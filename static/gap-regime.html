<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Engine 13 — Gap Regime Scanner | Raven-Tech.co</title>
    <meta name="theme-color" content="#f5f5f7" />
    <meta name="description" content="Raven-Tech.co — Engine 13: Post-gap regime analysis for SPX/SPY short premium management." />
    <link rel="icon" type="image/png" href="/static/RavenONLY.png" />
    <link rel="stylesheet" href="/static/styles.css?v=10" />
    <style>
      /* ── Engine 13 — Gap Regime Scanner ──────────────────────────── */

      .e13Grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 18px; }

      .e13Card {
        padding: 16px;
        border-radius: var(--radius-card);
        border: 1px solid var(--border);
        background: var(--surfaceSolid);
      }
      .e13CardLabel {
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px;
      }
      .e13CardValue {
        font-size: 22px; font-weight: 900;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--text); line-height: 1.2;
      }
      .e13CardCaption { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 4px; line-height: 1.4; }

      .e13Badge {
        display: inline-block; padding: 2px 8px; border-radius: 6px;
        font-size: 11px; font-weight: 700; vertical-align: middle; margin-left: 6px;
      }
      .e13Badge--green { background: rgba(52,199,89,0.12); color: var(--green); }
      .e13Badge--amber { background: rgba(255,159,10,0.12); color: var(--amber); }
      .e13Badge--red   { background: rgba(255,59,48,0.12); color: var(--red); }
      .e13Badge--blue  { background: rgba(0,122,255,0.12); color: var(--blue); }
      .e13Badge--muted { background: var(--hover); color: var(--muted); }

      .e13Divider {
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.06em; color: var(--muted);
        margin: 24px 0 12px; padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
      }

      .e13Table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 18px; }
      .e13Table th {
        text-align: left; padding: 8px 10px; font-weight: 700; font-size: 10px;
        text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted);
        border-bottom: 2px solid var(--border); white-space: nowrap;
      }
      .e13Table td { padding: 8px 10px; border-bottom: 1px solid var(--line); font-weight: 600; }
      .e13Table tr:hover td { background: var(--hover); }

      /* Scenario probability cards */
      .e13ScenarioPanel {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px;
      }
      .e13Scenario {
        padding: 18px; border-radius: var(--radius-card);
        border: 1px solid var(--border); background: var(--surfaceSolid);
        text-align: center; position: relative; overflow: hidden;
      }
      .e13Scenario.dominant { border-color: var(--blue); border-width: 2px; }
      .e13ScenarioName {
        font-size: 10px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px;
      }
      .e13ScenarioProb {
        font-size: 28px; font-weight: 900;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        line-height: 1.2;
      }
      .e13ScenarioBar {
        height: 4px; border-radius: 2px; background: var(--line); margin-top: 10px; overflow: hidden;
      }
      .e13ScenarioBarFill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
      .e13ScenarioBarFill.cont { background: var(--green); }
      .e13ScenarioBarFill.cons { background: var(--amber); }
      .e13ScenarioBarFill.rev  { background: var(--red); }

      .e13ScenarioCaption { font-size: 10px; color: var(--muted); margin-top: 6px; }

      /* Modifier / context tags row */
      .e13ModRow { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
      .e13ModTag {
        display: inline-block; padding: 3px 10px; border-radius: 6px;
        font-size: 10px; font-weight: 700; background: var(--hover);
        color: var(--muted); letter-spacing: 0.02em;
      }

      /* Advisor panel */
      .e13Advisor {
        padding: 20px; border-radius: var(--radius-card);
        border: 1px solid var(--border); background: var(--surfaceSolid);
        border-left: 4px solid var(--blue); margin-bottom: 18px;
      }
      .e13AdvisorHeader {
        display: flex; align-items: center; justify-content: space-between;
        flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
      }
      .e13AdvisorTitle { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
      .e13VerdictBadge {
        display: inline-block; padding: 4px 14px; border-radius: 8px;
        font-size: 14px; font-weight: 900; letter-spacing: 0.04em;
      }
      .e13VerdictBadge.hold { background: rgba(52,199,89,0.15); color: var(--green); }
      .e13VerdictBadge.roll { background: rgba(255,59,48,0.15); color: var(--red); }
      .e13VerdictBadge.adjust { background: rgba(255,159,10,0.15); color: var(--amber); }

      .e13AdvisorSection { margin-bottom: 12px; }
      .e13AdvisorSectionLabel {
        font-size: 10px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.05em; color: var(--muted); margin-bottom: 4px;
      }
      .e13AdvisorSectionBody { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.6; }

      /* Geopolitical sub-header */
      .e13SubHeader {
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.05em; color: var(--muted);
        margin: 14px 0 8px; padding-bottom: 4px;
      }

      /* Insight buttons (matches E12) */
      .e13InsightBtn {
        display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
        border-radius: 6px; border: 1px solid var(--border); background: var(--surfaceSolid);
        font-size: 9px; font-weight: 600; color: var(--muted); cursor: pointer;
        transition: all .15s ease; letter-spacing: 0.02em; vertical-align: middle;
      }
      .e13InsightBtn:hover { background: var(--hover); color: var(--text); border-color: var(--text); }
      .e13InsightBtn:disabled { opacity: 0.4; cursor: not-allowed; }

      @media (max-width: 700px) {
        .e13ScenarioPanel { grid-template-columns: 1fr; }
        .e13Grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="container" role="main">
      <header class="appHeader">
        <div class="appBrand">
          <img class="brandLogo" src="/static/RavenONLY.png" alt="Raven-Tech.co" />
          <div class="appHeaderText">
            <div class="appTitle">Raven-Tech.co</div>
            <div class="appSubtitle">Engine 13 — Gap Regime Scanner</div>
          </div>
        </div>
      </header>

      <section class="controlBar" aria-label="Engine 13 Controls">
        <div class="controlBarForm controlBarForm--engine2">
          <button id="runBtn" class="primaryButton">Run Scan</button>
          <div class="controlGroup" style="min-width:130px;">
            <label class="controlLabel" for="gapThreshold">Gap Threshold %</label>
            <input type="number" id="gapThreshold" class="controlInput" placeholder="1.5" min="0.5" max="5" step="0.25" value="1.5" style="width:120px;" />
          </div>
          <span id="status" class="status">Ready</span>
        </div>
      </section>

      <div class="results hidden" id="results">

        <div class="e13Divider"><span>Gap Overview</span></div>
        <div id="gapCards" class="e13Grid"></div>

        <div class="e13Divider"><span>Scenario Probabilities</span></div>
        <div id="scenarioPanel" class="e13ScenarioPanel"></div>
        <div id="modifiers" class="e13ModRow"></div>

        <div class="e13Divider"><span>Historical Gap Analogues</span></div>
        <div id="histStats" class="e13Grid"></div>
        <div id="histTable"></div>

        <div id="geoSection" style="display:none">
          <div class="e13SubHeader">Geopolitical Shock Analogues</div>
          <div id="geoTable"></div>
        </div>

        <div class="e13Divider"><span>Options Microstructure</span></div>
        <div id="optionsCards" class="e13Grid"></div>

        <div class="e13Divider"><span>Technical Context &amp; VIX</span></div>
        <div id="techVixCards" class="e13Grid"></div>

        <div class="e13Divider">
          <span>LLM Desk Note</span>
          <button id="advisorBtn" class="e13InsightBtn" onclick="runAdvisor()"><span class="ico">&#9998;</span> Get Desk Note</button>
        </div>
        <div id="advisorPanel"></div>

      </div>
    </main>

    <script src="/static/ui_kit.js?v=4"></script>
    <script src="/static/nav.js"></script>
    <script src="/static/gap-regime.js?v=2"></script>
  </body>
</html>
