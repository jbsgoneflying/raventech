# Include this file inside the `http { ... }` block of your nginx.conf (or in conf.d).
# Example:
#   sudo cp deploy/nginx/rate-limit.conf /etc/nginx/conf.d/rate-limit.conf

# Basic per-IP rate limiting for API endpoints (protects ORATS/Benzinga tokens).
limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=10r/s;


