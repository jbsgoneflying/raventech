# Nginx site config for `app.raven-tech.co` — the live Raven Tech v1 site.
#
# This file was originally generated on the droplet (certbot + manual edits
# for the flow-monitor mount) and was NOT in the repo. Bringing it in so the
# nginx state for `app.raven-tech.co` is version-controlled going forward.
#
# Routes:
#   /                 -> v1 FastAPI on :8000
#   /api/             -> v1 FastAPI on :8000 (rate-limited)
#   /api/v2/          -> v2 FastAPI on :8001 (Raven Tech v2 — added 2026-05-08)
#   /flow-monitor     -> Next.js prediction-market dashboard on :3000
#   /flow-monitor/api -> Flow-monitor backend on :3100
#
# Install (one-time, on droplet):
#   sudo cp deploy/nginx/site-app.raven-tech.co.conf /etc/nginx/sites-available/app.raven-tech.co
#   sudo nginx -t && sudo systemctl reload nginx

server {
  server_name app.raven-tech.co;

  # Allow large responses (tables/telemetry) and avoid premature proxy cutoffs.
  client_max_body_size 10m;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # API rate limiting (requires: limit_req_zone zone=api_ratelimit in http{}).
  location /api/ {
    limit_req zone=api_ratelimit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # ─── Raven Tech v2 API passthrough ─────────────────────────
  # /api/v2/* hits the v2 FastAPI service on :8001 while DNS for
  # the proper `v2.app.raven-tech.co` subdomain is being set up.
  # Longer-prefix wins over /api/ above, so v1 traffic is unaffected.
  # v1 has no /api/v2/* routes so this is conflict-free.
  location /api/v2/ {
    limit_req zone=api_ratelimit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # ─── Flow Monitor (Kalshi/Polymarket prediction market dashboard) ───
  # Next.js app with basePath: /flow-monitor
  # ─── Flow Monitor API (direct to backend, bypasses Next.js) ─────────
  location /flow-monitor/api/ {
    proxy_pass http://127.0.0.1:3100/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }

  location /flow-monitor {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE streams need long-lived connections (24h timeout)
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/app.raven-tech.co-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/app.raven-tech.co-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}




server {
    if ($host = app.raven-tech.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


  listen 80;
  server_name app.raven-tech.co;
    return 404; # managed by Certbot


}
