# Nginx site config template for `app.yourdomain.com`.
# - Proxies to the app container bound on 127.0.0.1:8000 (see docker-compose.yml).
# - Includes basic API rate limiting (requires rate-limit.conf in http{}).
# - Designed for certbot (Let’s Encrypt) with nginx plugin.
#
# Install (example):
#   sudo cp deploy/nginx/site-app.yourdomain.com.conf /etc/nginx/sites-available/app.yourdomain.com
#   sudo ln -s /etc/nginx/sites-available/app.yourdomain.com /etc/nginx/sites-enabled/app.yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then:
#   sudo certbot --nginx -d app.yourdomain.com

server {
  listen 80;
  server_name app.yourdomain.com;

  # Allow large responses (tables/telemetry) and avoid premature proxy cutoffs.
  client_max_body_size 10m;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # API rate limiting (requires: limit_req_zone zone=api_ratelimit in http{}).
  location /api/ {
    limit_req zone=api_ratelimit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # ─── Flow Monitor (Kalshi/Polymarket prediction market dashboard) ───
  # Next.js app with basePath: /flow-monitor
  location /flow-monitor/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE streams need long-lived connections (24h timeout)
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }
}


