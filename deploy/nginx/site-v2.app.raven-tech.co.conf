# Nginx site config for `v2.app.raven-tech.co` — Raven Tech v2.
# Proxies to the app-v2 container bound on 127.0.0.1:8001 (see docker-compose.yml).
#
# Manual install steps (one-time, on the droplet):
#
#   1. Add a DNS A record for v2.app.raven-tech.co pointing at the droplet IP
#      (DigitalOcean → Networking → Domains → raven-tech.co → Add A record).
#
#   2. sudo cp deploy/nginx/site-v2.app.raven-tech.co.conf \
#              /etc/nginx/sites-available/v2.app.raven-tech.co
#
#   3. sudo ln -s /etc/nginx/sites-available/v2.app.raven-tech.co \
#                 /etc/nginx/sites-enabled/v2.app.raven-tech.co
#
#   4. sudo nginx -t && sudo systemctl reload nginx
#
#   5. sudo certbot --nginx -d v2.app.raven-tech.co
#
# Until step 1 propagates, v2 is also reachable at
# `https://raven-tech.co/v2-preview/` via the path-prefix proxy in
# `site-root.raven-tech.co.conf` — no DNS or cert work required.

server {
  listen 80;
  server_name v2.app.raven-tech.co;

  client_max_body_size 10m;

  location / {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 240s;
    proxy_send_timeout 240s;
  }

  location /api/ {
    limit_req zone=api_ratelimit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 240s;
    proxy_send_timeout 240s;
  }
}
